<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro - Studs</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="./css/cadastro.css">
</head>

<body>
    <header class="main-header">
        <div class="header-container">
            <a href="#" class="logo">STUDS</a>
            <nav class="nav-menu">
                <a href="#" class="nav-link">Sobre</a>
                <a href="#" class="nav-link">Serviços</a>
                <a href="#" class="nav-link">Contato</a>
            </nav>
            <a href="#" class="cta-button">entrar</a>
        </div>
    </header>

    <main>
        <section class="esquerda">
            <img src="./img/Gemini_Generated_Image_mxgclmxgclmxgclm.png" alt="Imagem de um estudante com um tablet, simbolizando o aprendizado digital.">
        </section>
        <section class="direita">
            <div class="box">
                <div class="form-container">
                    <h1>Crie sua conta no Studs</h1>
                    <p>Junte-se a milhares de estudantes e organize sua rotina de estudos de forma eficiente.</p>
                    
                    <form action="#" method="POST">
                        <div class="input-group">
                            <label for="nome">Nome completo</label>
                            <input type="text" id="nome" name="nome" placeholder="Seu nome completo" required>
                        </div>
                        <div class="input-group">
                            <label for="email">E-mail</label>
                            <input type="email" id="email" name="email" placeholder="nome@exemplo.com" required>
                        </div>
                        <div class="input-group">
                            <label for="senha">Senha</label>
                            <input type="password" id="senha" name="senha" placeholder="Crie uma senha forte" required>
                        </div>
                        
                        <button type="submit" class="submit-button">Cadastrar</button>
                    </form>
                    
                    <p class="login-link">Já tem uma conta? <a href="#">Faça login</a></p>
                </div>
            </div>
        </section>
    </main>
</body>

</html>
